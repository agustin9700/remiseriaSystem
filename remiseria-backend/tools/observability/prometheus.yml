global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - 'rules/*.yml'

scrape_configs:
  - job_name: "remiseria-backend"
    static_configs:
      - targets: ["localhost:3000"]
        labels:
          service: "remiseria-backend"
          env: "development"
    metrics_path: "/metrics"
    scrape_interval: 10s